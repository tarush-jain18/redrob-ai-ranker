ai_usage_summary: |
  Used ChatGPT for debugging, code review, architecture discussions,
  optimization suggestions, Git/GitHub troubleshooting, Streamlit deployment,
  and implementation guidance. All ranking logic, execution, and submission
  generation were performed locally by the team. No external AI APIs were used
  during candidate ranking or inference.


methodology_summary: |
  We built an AI-powered candidate ranking system that matches job
  descriptions with candidate profiles using semantic search and hybrid
  scoring. Candidate profiles were converted into structured text and
  encoded using the all-MiniLM-L6-v2 Sentence Transformer model. The job
  description was embedded in the same vector space, and cosine similarity
  was used to measure relevance.

  To improve ranking quality, semantic similarity was combined with
  experience, skill relevance, recruiter engagement signals, and hiring
  readiness indicators. The system also generates concise reasoning for
  each recommendation, improving transparency and explainability.

  The final solution processed 100,000 candidate profiles on CPU,
  generated the top 100 ranked candidates, passed the official validation
  pipeline, and was deployed with a Streamlit-based sandbox for
  demonstration.


